        const getCoordinatesForAddressHeuristic = (address, index) => {
            const zones = [
                { keyword: "고잔", lat: 37.316, lng: 126.830 },
                { keyword: "중앙", lat: 37.318, lng: 126.837 },
                { keyword: "초지", lat: 37.302, lng: 126.812 },
                { keyword: "선부", lat: 37.337, lng: 126.806 },
                { keyword: "원곡", lat: 37.324, lng: 126.791 },
                { keyword: "성포", lat: 37.327, lng: 126.845 },
                { keyword: "월피", lat: 37.333, lng: 126.851 },
                { keyword: "와동", lat: 37.339, lng: 126.818 },
                { keyword: "본오", lat: 37.298, lng: 126.864 },
                { keyword: "사동", lat: 37.296, lng: 126.844 },
                { keyword: "일동", lat: 37.322, lng: 126.865 },
                { keyword: "이동", lat: 37.316, lng: 126.852 },
                { keyword: "팔곡", lat: 37.302, lng: 126.883 },
                { keyword: "부곡", lat: 37.338, lng: 126.861 },
                { keyword: "신길", lat: 37.329, lng: 126.772 },
                { keyword: "대부", lat: 37.264, lng: 126.595 },
                { keyword: "풍도", lat: 37.098, lng: 126.384 }
            ];

            let matchedLat = 37.3218778; // Ansan City Hall (Fallback)
            let matchedLng = 126.8308821;

            for (const zone of zones) {
                if (address.includes(zone.keyword)) {
                    matchedLat = zone.lat;
                    matchedLng = zone.lng;
                    break;
                }
            }

            // Pseudo-random jitter generator to prevent markers overlapping perfectly
            const hash = (str) => {
                let h = 0;
                for (let i = 0; i < str.length; i++) {
                    h = str.charCodeAt(i) + ((h << 5) - h);
                }
                return h;
            };

            const seed = hash(address + String(index));
            const latOffset = ((seed % 100) / 100 - 0.5) * 0.016; 
            const lngOffset = (((seed >> 8) % 100) / 100 - 0.5) * 0.019;

            return {
                lat: parseFloat((matchedLat + latOffset).toFixed(6)),
                lng: parseFloat((matchedLng + lngOffset).toFixed(6))
            };
        };

        function App() {
            const [restaurants, setRestaurants] = useState(defaultRestaurants);
            const [selectedId, setSelectedId] = useState(null);
            const [regionFilter, setRegionFilter] = useState("전체"); // 전체, 단원구, 상록구
            const [categoryFilter, setCategoryFilter] = useState("전체"); // 한식, 양식, 등
            const [searchQuery, setSearchQuery] = useState("");
            const [importedCount, setImportedCount] = useState(0);
            const [isImporting, setIsImporting] = useState(false);
            const [activeTab, setActiveTab] = useState("list"); // Mobile responsive: 'list' or 'map'

            // Ref for Leaflet Map instance
            const mapRef = useRef(null);
            const markersLayerRef = useRef(null);
            const mapContainerId = "leaflet-ansan-map";

            // Categorize list of cuisines
            const categories = ["전체", "한식", "양식", "중식", "일식/아시안", "기타"];

            // Find current active restaurant details
            const activeRestaurant = useMemo(() => {
                return restaurants.find(r => r.id === selectedId) || null;
            }, [restaurants, selectedId]);

            const mapCSVHeaders = (headers) => {
                const mapping = {
                    name: -1, address: -1, category: -1, phone: -1,
                    seats: -1, parking: -1, holiday: -1, description: -1
                };
                headers.forEach((header, idx) => {
                    const clean = header.trim();
                    if (/상호|이름|식당명|업소명|제목|글제목/i.test(clean)) mapping.name = idx;
                    else if (/주소|소재지|도로명|지번/i.test(clean)) mapping.address = idx;
                    else if (/분류|음식종류|업종|카테고리/i.test(clean)) mapping.category = idx;
                    else if (/전화|연락처|전화번호/i.test(clean)) mapping.phone = idx;
                    else if (/좌석|크기|규모|인원/i.test(clean)) mapping.seats = idx;
                    else if (/주차|주차장|파킹/i.test(clean)) mapping.parking = idx;
                    else if (/휴무|휴일|휴업|쉬는날/i.test(clean)) mapping.holiday = idx;
                    else if (/설명|내용|특징|요약/i.test(clean)) mapping.description = idx;
                });
                return mapping;
            };

            const handleCSVUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setIsImporting(true);
                Papa.parse(file, {
                    header: false,
                    skipEmptyLines: true,
                    complete: function (results) {
                        const data = results.data;
                        if (data.length < 2) {
                            alert("업로드된 파일에 충분한 맛집 데이터가 존재하지 않습니다.");
                            setIsImporting(false);
                            return;
                        }

                        const headers = data[0];
                        const colMap = mapCSVHeaders(headers);

                        // If at least name and address columns are found, proceed with parsing
                        if (colMap.name === -1 || colMap.address === -1) {
                            alert("필수 항목(상호명/식당이름, 주소) 컬럼을 CSV에서 인식하지 못했습니다.\n적절한 헤더를 포함하고 있는지 확인해 주세요.");
                            setIsImporting(false);
                            return;
                        }

                        const newRestaurants = [];
                        
                        for (let i = 1; i < data.length; i++) {
                            const row = data[i];
                            if (row.length < headers.length) continue;

                            const rawAddress = row[colMap.address] || "";
                            if (!rawAddress) continue;

                            const name = row[colMap.name] || `생생맛집 #${i}`;
                            const phone = colMap.phone !== -1 ? row[colMap.phone] || "정보 없음" : "정보 없음";
                            const rawCategory = colMap.category !== -1 ? row[colMap.category] || "기타" : "한식";
                            
                            // Normalizing Gu category
                            let gu = "단원구";
                            if (rawAddress.includes("상록구")) {
                                gu = "상록구";
                            }

                            // Normalizing Category
                            let normalizedCategory = "한식";
                            if (/한식|백반|정식|탕|고기|찌개|갈비/i.test(rawCategory)) normalizedCategory = "한식";
                            else if (/양식|파스타|스테이크|피자|바비큐/i.test(rawCategory)) normalizedCategory = "양식";
                            else if (/중식|마라|짜장|짬뽕/i.test(rawCategory)) normalizedCategory = "중식";
                            else if (/일식|동남아|아시안|인도|쌀국수|스시|초밥|사시미/i.test(rawCategory)) normalizedCategory = "일식/아시안";
                            else normalizedCategory = "기타";

                            const seats = colMap.seats !== -1 ? row[colMap.seats] || "정보 없음" : "정보 없음";
                            const parking = colMap.parking !== -1 ? row[colMap.parking] || "정보 없음" : "정보 없음";
                            const holiday = colMap.holiday !== -1 ? row[colMap.holiday] || "정보 없음" : "정보 없음";
                            const description = colMap.description !== -1 ? row[colMap.description] || `${name}은(는) 안산시에서 공식 선정한 특색 있고 건강한 맛과 정성을 다하는 추천 맛집입니다.` : `${name}은(는) 안산시에서 공식 선정한 특색 있고 건강한 맛과 정성을 다하는 추천 맛집입니다.`;

                            // Map coordinates based on address heuristics
                            const coords = getCoordinatesForAddressHeuristic(rawAddress, i);

                            newRestaurants.push({
                                id: 1000 + i,
                                name,
                                category: normalizedCategory,
                                address: rawAddress,
                                gu,
                                phone,
                                seats,
                                parking,
                                holiday,
                                description,
                                lat: coords.lat,
                                lng: coords.lng
                            });
                        }

                        if (newRestaurants.length > 0) {
                            setRestaurants(newRestaurants);
                            setImportedCount(newRestaurants.length);
                            setSelectedId(null);
                            
                            // Fly map to central Ansan city hall position
                            if (mapRef.current) {
                                mapRef.current.setView([37.3218778, 126.8308821], 12);
                            }
                        } else {
                            alert("인식 가능한 형태의 맛집 레코드가 존재하지 않습니다.");
                        }
                        setIsImporting(false);
                    },
                    error: function (err) {
                        alert("CSV 파일을 파싱하는 과정에서 에러가 발생했습니다: " + err.message);
                        setIsImporting(false);
                    }
                });
            };

            const filteredRestaurants = useMemo(() => {
                return restaurants.filter(item => {
                    const matchRegion = regionFilter === "전체" || item.gu === regionFilter;
                    const matchCategory = categoryFilter === "전체" || item.category === categoryFilter;
                    const matchQuery = !searchQuery || 
                        item.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        item.address.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        item.description.toLowerCase().includes(searchQuery.toLowerCase());
                    return matchRegion && matchCategory && matchQuery;
                });
            }, [restaurants, regionFilter, categoryFilter, searchQuery]);

            useEffect(() => {
                // Initialize the map once
                if (!mapRef.current) {
                    const ansanCenter = [37.3218778, 126.8308821];
                    const map = L.map(mapContainerId, {
                        zoomControl: false // custom placement below
                    }).setView(ansanCenter, 13);

                    // High contrast stylish light tile layers
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                        subdomains: 'abcd',
                        maxZoom: 19

                    // Add Custom Zoom Control to top right
                    L.control.zoom({ position: 'topright' }).addTo(map);

                    mapRef.current = map;
                    markersLayerRef.current = L.layerGroup().addTo(map);
                }

                // Cleanup on unmount
                return () => {
                    if (mapRef.current) {
                        mapRef.current.remove();
                        mapRef.current = null;
